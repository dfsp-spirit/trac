<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="consent.pageTitle">Consent | TRAC</title>
    <link href="/assets/fonts/inter/inter.css" rel="stylesheet">
    <link rel="stylesheet" href="/assets/fonts/fontawesome/css/all.min.css">
    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #475569;
            --background-color: #f8fafc;
            --text-color: #1e293b;
            --border-color: #e2e8f0;
            --surface-color: #ffffff;
            --success-color: #059669;
            --danger-color: #dc2626;
        }

        html {
            min-height: 100%;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(37, 99, 235, 0.12), transparent 32%),
                radial-gradient(circle at bottom right, rgba(5, 150, 105, 0.08), transparent 28%),
                linear-gradient(135deg, var(--background-color) 0%, #e2e8f0 100%);
            color: var(--text-color);
            display: grid;
            grid-template-columns: 1fr minmax(0, 1100px) 1fr;
            grid-auto-rows: 1fr;
            padding: 0;
            box-sizing: border-box;
        }

        .consent-shell {
            grid-column: 2;
            width: 100%;
            background: var(--surface-color);
            border-left: 1px solid rgba(226, 232, 240, 0.95);
            border-right: 1px solid rgba(226, 232, 240, 0.95);
            border-top: none;
            border-bottom: none;
            border-radius: 0;
            box-shadow: none;
            overflow: visible;
            animation: none;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .consent-header {
            padding: 24px 32px 12px;
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(180deg, rgba(37, 99, 235, 0.02), rgba(37, 99, 235, 0));
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 0.55rem;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 12px;
        }

        .eyebrow i {
            font-size: 0.95rem;
        }

        h1 {
            margin: 0 0 10px;
            font-size: clamp(2rem, 3.2vw, 2.75rem);
            line-height: 1.08;
            color: var(--text-color);
        }

        .subtitle {
            margin: 0;
            color: var(--secondary-color);
            line-height: 1.6;
            font-size: 1.02rem;
            max-width: 70ch;
        }

        .study-metadata {
            margin: 8px 0 0;
            color: var(--secondary-color);
            font-size: 0.98rem;
            line-height: 1.3;
            max-width: 70ch;
        }

        .consent-body {
            padding: 16px 32px 20px;
        }

        .consent-text {
            color: var(--text-color);
            line-height: 1.75;
            font-size: 1rem;
        }

        .consent-text h1,
        .consent-text h2,
        .consent-text h3,
        .consent-text h4 {
            margin: 1.2em 0 0.55em;
            line-height: 1.2;
        }

        .consent-text p {
            margin: 0 0 1em;
        }

        .consent-text ul,
        .consent-text ol {
            margin: 0 0 1em 1.35em;
            padding: 0;
        }

        .consent-text li + li {
            margin-top: 0.35em;
        }

        .consent-text a {
            color: var(--primary-color);
            font-weight: 600;
            text-decoration: none;
        }

        .consent-text a:hover,
        .consent-text a:focus {
            text-decoration: underline;
        }

        .consent-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 28px;
            padding-top: 24px;
            border-top: 1px solid var(--border-color);
        }

        .btn {
            border: 0;
            border-radius: 14px;
            padding: 14px 18px;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            min-height: 52px;
            min-width: 190px;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(15, 23, 42, 0.08);
        }

        .btn:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        .btn-primary:disabled {
            background: #9aa5b1; /* more gray, less green */
            color: #ffffff;
            box-shadow: none;
        }
        .btn-secondary:disabled {
            background: #f3f4f6;
            color: #9aa5b1;
            border-color: transparent;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--success-color), #0f766e);
            color: white;
        }

        .btn-secondary {
            background: #fff1f2;
            color: var(--danger-color);
            border: 1px solid rgba(220, 38, 38, 0.2);
        }

        .status {
            margin-top: 14px;
            min-height: 1.5em;
            color: var(--secondary-color);
            font-size: 0.95rem;
        }

        .error {
            color: var(--danger-color);
        }

        @media (max-width: 640px) {
            body {
                grid-template-columns: 12px 1fr 12px;
            }

            .consent-shell {
                grid-column: 2;
            }

            .consent-header,
            .consent-body {
                padding-left: 18px;
                padding-right: 18px;
            }

            .consent-actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                min-width: 0;
            }
        }
    </style>
    <script src="../settings/tud_settings.js"></script>
    <script src="../js/i18n.js" type="module"></script>
</head>
<body>
    <main class="consent-shell" aria-labelledby="consent-title">
        <header class="consent-header">
            <div class="eyebrow"><i class="fas fa-shield-heart" aria-hidden="true"></i><span data-i18n="consent.eyebrow">Study consent</span></div>
            <h1 id="consent-title" data-i18n="consent.title">Consent</h1>
            <br />
            <div id="study-metadata" class="study-metadata" aria-live="polite"></div>
            <br />
            <p class="subtitle" data-i18n="consent.subtitle">Please read the consent information below before starting the study.</p>
        </header>

        <section class="consent-body">
            <div id="study-consent-text" class="consent-text" aria-live="polite"></div>

            <br />

            <div class="consent-checkbox" style="margin-top:18px;">
                <label style="display:inline-flex;align-items:center;gap:0.6rem;font-size:0.98rem;">
                    <input id="consentCheckbox" type="checkbox" aria-labelledby="consent-checkbox-label">
                    <span id="consent-checkbox-label" data-i18n="consent.checkboxLabel" style="font-weight:700">I have read and understood the information on this page.</span>
                </label>
            </div>

            <div class="consent-actions">
                <button id="consentAcceptBtn" type="button" class="btn btn-primary" data-i18n="buttons.giveConsent">Give consent and continue</button>
                <button id="consentDeclineBtn" type="button" class="btn btn-secondary" data-i18n="buttons.declineConsent">Decline consent</button>
            </div>

            <div id="consentStatus" class="status" role="status" aria-live="polite"></div>
        </section>
    </main>

    <script type="module">
        import i18n from '../js/i18n.js';
        import { renderMarkdown } from '../js/markdown.js';

        function getStudyEndpoint(language) {
            const urlParams = new URLSearchParams(window.location.search);
            const studyName = urlParams.get('study_name') || 'default';
            const participantId = urlParams.get('pid');
            const apiBaseUrl = window.TUD_SETTINGS?.API_BASE_URL || '/api';
            const endpointUrl = new URL(
                `${apiBaseUrl}/studies/${studyName}/study-config`,
                window.location.origin
            );

            if (participantId) {
                endpointUrl.searchParams.set('participant_id', participantId);
            }
            if (language) {
                endpointUrl.searchParams.set('lang', language);
            }
            return endpointUrl;
        }

        async function loadStudyConfig(language) {
            const response = await fetch(getStudyEndpoint(language).toString(), {
                headers: {
                    Accept: 'application/json',
                },
            });

            if (!response.ok) {
                throw new Error(`Failed to load study-config: ${response.status}`);
            }

            return await response.json();
        }

        function getUrlParams() {
            return new URLSearchParams(window.location.search);
        }

        function escapeHtml(str) {
            if (str === null || str === undefined) return '';
            return String(str).replace(/[&<>"']/g, function (s) {
                return ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#39;'
                })[s];
            });
        }

        function setStatus(message, isError = false) {
            const statusEl = document.getElementById('consentStatus');
            if (!statusEl) {
                return;
            }
            statusEl.textContent = message || '';
            statusEl.classList.toggle('error', Boolean(isError));
        }

        function getSafeRedirectUrl(relativePath) {
            const url = new URL(relativePath, window.location.href);
            const currentParams = getUrlParams();
            currentParams.forEach((value, key) => {
                url.searchParams.append(key, value);
            });
            return url.toString();
        }

        function shouldAutoAcceptConsent() {
            return Boolean(navigator.webdriver);
        }

        async function saveConsent(consentGiven) {
            const params = getUrlParams();
            const studyName = params.get('study_name') || 'default';
            const participantId = params.get('pid');
            const apiBaseUrl = window.TUD_SETTINGS?.API_BASE_URL || '/api';

            if (!participantId) {
                throw new Error('Missing participant id');
            }

            const response = await fetch(
                `${apiBaseUrl}/studies/${encodeURIComponent(studyName)}/participants/${encodeURIComponent(participantId)}/consent`,
                {
                    method: 'POST',
                    headers: {
                        Accept: 'application/json',
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ consent_given: consentGiven }),
                }
            );

            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(errorText || `Consent save failed: ${response.status}`);
            }

            return await response.json();
        }

        function wireButtons() {
            const acceptBtn = document.getElementById('consentAcceptBtn');
            const declineBtn = document.getElementById('consentDeclineBtn');
            const consentCheckbox = document.getElementById('consentCheckbox');
            if (!acceptBtn || !declineBtn) {
                return;
            }

            // Require checkbox to be checked before enabling the primary consent button
            const updateButtonsState = () => {
                const disabled = !(consentCheckbox && consentCheckbox.checked);
                acceptBtn.disabled = disabled;
                declineBtn.disabled = disabled;
                // tooltip when disabled
                const tip = (i18n && i18n.t) ? (i18n.t('consent.checkboxTooltip') || 'Please tick the checkbox above') : 'Please tick the checkbox above';
                try {
                    acceptBtn.title = disabled ? tip : '';
                    declineBtn.title = disabled ? tip : '';
                } catch (e) {
                    acceptBtn.title = disabled ? 'Please tick the checkbox above' : '';
                    declineBtn.title = disabled ? 'Please tick the checkbox above' : '';
                }
            };

            if (consentCheckbox) {
                updateButtonsState();
                consentCheckbox.addEventListener('change', () => {
                    updateButtonsState();
                });
            } else {
                acceptBtn.disabled = false;
                declineBtn.disabled = false;
                acceptBtn.title = '';
                declineBtn.title = '';
            }

            const setBusy = (busy) => {
                const checkboxChecked = consentCheckbox ? consentCheckbox.checked : true;
                const disabled = busy || !checkboxChecked;
                acceptBtn.disabled = disabled;
                declineBtn.disabled = disabled;
                const tip = (i18n && i18n.t) ? (i18n.t('consent.checkboxTooltip') || 'Please tick the checkbox above') : 'Please tick the checkbox above';
                try {
                    acceptBtn.title = disabled ? tip : '';
                    declineBtn.title = disabled ? tip : '';
                } catch (e) {
                    acceptBtn.title = disabled ? 'Please tick the checkbox above' : '';
                    declineBtn.title = disabled ? 'Please tick the checkbox above' : '';
                }
            };

            acceptBtn.addEventListener('click', async () => {
                try {
                    setBusy(true);
                    setStatus(i18n.t('consent.saving') || 'Saving consent...');
                    await saveConsent(true);
                    window.location.href = getSafeRedirectUrl('instructions.html');
                } catch (error) {
                    console.error('Failed to save consent:', error);
                    setStatus(i18n.t('consent.saveError') || 'Could not save consent.', true);
                    setBusy(false);
                }
            });

            declineBtn.addEventListener('click', async () => {
                try {
                    setBusy(true);
                    setStatus(i18n.t('consent.saving') || 'Saving consent...');
                    await saveConsent(false);
                    const nextUrl = new URL('thank-you.html', window.location.href);
                    nextUrl.searchParams.set('completion_status', 'noconsent');
                    getUrlParams().forEach((value, key) => {
                        nextUrl.searchParams.append(key, value);
                    });
                    window.location.href = nextUrl.toString();
                } catch (error) {
                    console.error('Failed to save consent:', error);
                    setStatus(i18n.t('consent.saveError') || 'Could not save consent.', true);
                    setBusy(false);
                }
            });
        }

        async function initializeConsentPage() {
            const params = getUrlParams();
            const requestedLanguage = params.get('lang');
            let studyConfig = null;
            let language = requestedLanguage || 'en';

            try {
                studyConfig = await loadStudyConfig(requestedLanguage);
                language = studyConfig.selected_language || language || studyConfig.default_language || 'en';
                await i18n.init(language);
                i18n.applyTranslations();
                document.documentElement.lang = language;
                document.title = `${studyConfig.study_name || 'Study'} consent page | TRAC`;

                const consentTextEl = document.getElementById('study-consent-text');
                if (consentTextEl) {
                    const consentText = studyConfig?.study_text_consent || '';
                    consentTextEl.innerHTML = consentText ? renderMarkdown(consentText) : '<p>Please review the information before continuing.</p>';
                }

                // Show study metadata (localized labels: Study Name, Description)
                const studyMetaEl = document.getElementById('study-metadata');
                if (studyMetaEl) {
                    try {
                        const fullName = studyConfig?.study_name || '';
                        const desc = studyConfig?.description || '';
                        const nameLabel = escapeHtml(i18n.t('consent.studyName') || 'Study Name');
                        const descLabel = escapeHtml(i18n.t('consent.description') || 'Description');
                        const parts = [];
                        if (fullName) {
                            parts.push(`<div><strong>${nameLabel}:</strong> ${escapeHtml(fullName)}</div>`);
                        }
                        if (desc) {
                            parts.push(`<div style="margin-top:0.25rem;color:var(--secondary-color)"><strong>${descLabel}:</strong> ${escapeHtml(desc)}</div>`);
                        }
                        studyMetaEl.innerHTML = parts.join('');
                    } catch (err) {
                        console.warn('Failed to render study metadata:', err);
                        studyMetaEl.textContent = '';
                    }
                }

                if (studyConfig?.consent_given === true) {
                    window.location.href = getSafeRedirectUrl('instructions.html');
                    return;
                }
                if (studyConfig?.consent_given === false) {
                    const nextUrl = new URL('thank-you.html', window.location.href);
                    nextUrl.searchParams.set('completion_status', 'noconsent');
                    getUrlParams().forEach((value, key) => {
                        nextUrl.searchParams.append(key, value);
                    });
                    window.location.href = nextUrl.toString();
                    return;
                }

                if (shouldAutoAcceptConsent()) {
                    await saveConsent(true);
                    window.location.href = getSafeRedirectUrl('instructions.html');
                    return;
                }

                wireButtons();
            } catch (error) {
                console.error('Failed to initialize consent page:', error);
                await i18n.init(language).catch(() => {});
                i18n.applyTranslations();
                setStatus(i18n.t('consent.loadError') || 'Could not load consent information.', true);
                const consentTextEl = document.getElementById('study-consent-text');
                if (consentTextEl) {
                    consentTextEl.innerHTML = '<p>Could not load the consent information. Please reload the page.</p>';
                }
                wireButtons();
            }
        }

        document.addEventListener('DOMContentLoaded', initializeConsentPage);
    </script>
</body>
</html>
