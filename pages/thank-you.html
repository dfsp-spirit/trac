<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="thankYou.title">Thank You - TRAC</title>
    <link href="/assets/fonts/inter/inter.css" rel="stylesheet">
    <link rel="stylesheet" href="/assets/fonts/fontawesome/css/all.min.css">
    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #475569;
            --background-color: #f8fafc;
            --text-color: #1e293b;
            --border-color: #e2e8f0;
            --success-color: #059669;
            --danger-color: #dc2626;
        }

        html {
            height: 100%;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--background-color) 0%, #e2e8f0 100%);
            color: var(--text-color);
            display: grid;
            grid-template-columns: 1fr minmax(0, 1100px) 1fr;
            grid-auto-rows: 1fr;
        }

        .thank-you-container {
            grid-column: 2;
            width: 100%;
            margin: 0;
            padding: 36px 28px;
            background: white;
            border-left: 1px solid rgba(226, 232, 240, 0.95);
            border-right: 1px solid rgba(226, 232, 240, 0.95);
            border-radius: 0;
            box-shadow: none;
            text-align: center;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: var(--success-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            animation: scaleIn 0.5s ease-out 0.2s both;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0);
            }
            to {
                transform: scale(1);
            }
        }

        .success-icon i {
            font-size: 36px;
            color: white;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-color);
            margin: 0 0 16px;
            line-height: 1.2;
        }

        .subtitle {
            font-size: 18px;
            color: var(--secondary-color);
            margin: 0 0 32px;
            line-height: 1.5;
        }

        .message {
            font-size: 16px;
            color: var(--secondary-color);
            line-height: 1.6;
            margin: 0;
        }

        .continue-link {
            color: var(--primary-color);
            font-weight: 600;
            text-decoration: none;
        }

        .continue-link:hover,
        .continue-link:focus {
            text-decoration: underline;
        }

        .follow-up-link-row {
            display: block;
            margin-top: 16px;
        }

        .follow-up-task-title {
            color: var(--text-color);
            font-weight: 600;
        }

        .follow-up-link-row.is-completed .follow-up-task-title {
            color: #64748b;
        }

        .follow-up-task-status {
            display: inline-block;
            margin-left: 8px;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 12px;
            line-height: 1.4;
            font-weight: 600;
            vertical-align: middle;
            background: #dbeafe;
            color: #1e40af;
        }

        .follow-up-task-status.is-completed {
            background: #e2e8f0;
            color: #334155;
        }

        .follow-up-task-status.is-pending {
            background: #fef3c7;
            color: #92400e;
        }

        .follow-up-task-description {
            display: block;
            margin-top: 6px;
            font-size: 14px;
            color: var(--secondary-color);
        }

        .follow-up-link-row.is-completed .follow-up-task-description {
            color: #64748b;
        }

        .app-name {
            font-weight: 600;
            color: var(--primary-color);
        }

        @media (max-width: 480px) {
            body {
                grid-template-columns: 12px 1fr 12px;
            }

            .thank-you-container {
                grid-column: 2;
                padding: 28px 20px;
            }

            h1 {
                font-size: 28px;
            }

            .subtitle {
                font-size: 16px;
            }

            .success-icon {
                width: 64px;
                height: 64px;
            }

            .success-icon i {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="thank-you-container">
        <div class="success-icon">
            <i class="fas fa-check"></i>
        </div>

        <h1 data-i18n="thankYou.heading">Thank You!</h1>

        <p class="subtitle" data-i18n="thankYou.subtitle">Your submission has been saved successfully.</p>

        <p id="study-custom-message-end" class="message">
            Thank you for participating in our <span class="app-name">TRAC</span> study.
            Your responses have been recorded and will contribute to valuable research.
        </p>
    </div>

    <script src="../settings/tud_settings.js"></script>
    <script type="module">
        import i18n from '../js/i18n.js';
        import { renderMarkdown } from '../js/markdown.js';

        async function loadStudyConfig(language) {
            const urlParams = new URLSearchParams(window.location.search);
            const studyName = urlParams.get('study_name') || 'default';
            const participantId = urlParams.get('pid');
            const apiBaseUrl = window.TUD_SETTINGS?.API_BASE_URL || '/api';
            const endpointUrl = new URL(`${apiBaseUrl}/studies/${studyName}/study-config`, window.location.origin);

            if (participantId) {
                endpointUrl.searchParams.set('participant_id', participantId);
            }
            if (language) {
                endpointUrl.searchParams.set('lang', language);
            }

            const response = await fetch(endpointUrl.toString(), {
                headers: {
                    'Accept': 'application/json'
                }
            });

            if (!response.ok) {
                throw new Error(`Failed to load study-config: ${response.status}`);
            }

            return await response.json();
        }

        function applyStudyOutroText(studyConfig, language) {
            const customEndElement = document.getElementById('study-custom-message-end');
            if (!customEndElement) {
                return;
            }

            const urlParams = new URLSearchParams(window.location.search);
            const completionStatus = urlParams.get('completion_status') || 'completed';
            const selectedField = completionStatus === 'skipped'
                ? 'study_text_end_skipped'
                : completionStatus === 'noconsent'
                    ? 'study_text_end_noconsent'
                    : 'study_text_end_completed';

            const customText = studyConfig?.[selectedField];
            if (typeof customText === 'string' && customText.trim() !== '') {
                customEndElement.innerHTML = customText;
            }

            document.documentElement.lang = language;
        }

        function getCompletionStatus() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('completion_status') || 'completed';
        }

        function appendFollowUpTask({
            href = null,
            text,
            description = '',
            className = 'continue-link',
            statusLabel = '',
            statusClassName = '',
            isCompleted = false,
        }) {
            const customEndElement = document.getElementById('study-custom-message-end');
            if (!customEndElement || !text) {
                return;
            }

            const row = document.createElement('span');
            row.className = 'follow-up-link-row';
            if (isCompleted) {
                row.classList.add('is-completed');
            }

            let titleElement = null;
            if (typeof href === 'string' && href.trim() !== '') {
                titleElement = document.createElement('a');
                titleElement.href = href;
                titleElement.className = className;
            } else {
                titleElement = document.createElement('span');
                titleElement.className = 'follow-up-task-title';
            }

            titleElement.textContent = text;
            row.appendChild(titleElement);

            if (typeof statusLabel === 'string' && statusLabel.trim() !== '') {
                const statusElement = document.createElement('span');
                statusElement.className = 'follow-up-task-status';
                if (typeof statusClassName === 'string' && statusClassName.trim() !== '') {
                    statusElement.classList.add(statusClassName.trim());
                }
                statusElement.textContent = statusLabel.trim();
                row.appendChild(statusElement);
            }

            if (typeof description === 'string' && description.trim() !== '') {
                const descriptionElement = document.createElement('span');
                descriptionElement.className = 'follow-up-task-description';
                descriptionElement.textContent = description.trim();
                row.appendChild(descriptionElement);
            }

            customEndElement.appendChild(document.createElement('br'));
            customEndElement.appendChild(row);
        }


        function getSafeReturnUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            const rawReturnUrl = (urlParams.get('return_url') || '').trim();

            if (!rawReturnUrl) {
                return null;
            }

            try {
                const parsed = new URL(rawReturnUrl, window.location.origin);
                if (parsed.protocol !== 'http:' && parsed.protocol !== 'https:') {
                    return null;
                }
                return parsed.toString();
            } catch (error) {
                console.warn('Invalid return_url provided on thank-you page:', error);
                return null;
            }
        }

        function applyReturnUrlLink() {
            if (getCompletionStatus() === 'noconsent') {
                return;
            }

            const safeReturnUrl = getSafeReturnUrl();
            if (!safeReturnUrl) {
                return;
            }

            const linkText = window.i18n?.t('thankYou.continueLink') || 'Click here to continue.';
            appendFollowUpTask({
                href: safeReturnUrl,
                text: linkText,
            });
        }


        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const requestedLanguage = urlParams.get('lang');

            let studyConfig = null;
            try {
                studyConfig = await loadStudyConfig(requestedLanguage || undefined);
            } catch (error) {
                console.warn('Could not load study-config for thank-you page:', error.message);
            }

            const language = requestedLanguage || studyConfig?.selected_language || studyConfig?.default_language || 'en';

            await i18n.init(language);
            i18n.applyTranslations();

            applyStudyOutroText(studyConfig, language);
            applyReturnUrlLink();
        });
    </script>
</body>
</html>
