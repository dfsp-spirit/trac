name: TUD Backend Wheel Smoke Tests
on: [push, pull_request]

jobs:
  wheel-smoke-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: timeusediary_db
          POSTGRES_USER: timeusediary_user
          POSTGRES_PASSWORD: timeusediary_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build backend wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip wheel ./backend -w /tmp/tud-wheelhouse --no-deps

      - name: Install wheel into isolated venv
        run: |
          python -m venv /tmp/tud-wheel-venv
          /tmp/tud-wheel-venv/bin/pip install --upgrade pip
          /tmp/tud-wheel-venv/bin/pip install /tmp/tud-wheelhouse/o_timeusediary_backend-*.whl

      - name: Verify import comes from installed wheel
        run: |
          /tmp/tud-wheel-venv/bin/python -c "import o_timeusediary_backend; p=o_timeusediary_backend.__file__; print(p); assert 'site-packages' in p, p"

      - name: Prepare runtime studies and activities files
        run: |
          mkdir -p /tmp/tud-wheel-runtime
          cp backend/studies_config.json /tmp/tud-wheel-runtime/
          cp backend/activities_*.json /tmp/tud-wheel-runtime/

      - name: Start backend from wheel and test admin pages
        env:
          TUD_DATABASE_URL: postgresql://timeusediary_user:timeusediary_password@localhost:5432/timeusediary_db
          TUD_ALLOWED_ORIGINS: '["http://localhost:3000", "http://127.0.0.1:3000"]'
          TUD_API_ADMIN_USERNAME: timeusediary_api_admin
          TUD_API_ADMIN_PASSWORD: timeusediary_api_admin_password
          TUD_ROOTPATH: ""
          TUD_FRONTEND_URL: http://localhost:3000/report/
          TUD_STUDIES_CONFIG_PATH: /tmp/tud-wheel-runtime/studies_config.json
        run: |
          cd /tmp/tud-wheel-runtime
          /tmp/tud-wheel-venv/bin/uvicorn o_timeusediary_backend.api:app --host 127.0.0.1 --port 8010 > /tmp/tud-wheel-backend.log 2>&1 &

          timeout 90s bash -c 'until curl -fsS http://127.0.0.1:8010/docs > /dev/null; do sleep 2; done'

          curl -fsS -u "$TUD_API_ADMIN_USERNAME:$TUD_API_ADMIN_PASSWORD" \
            http://127.0.0.1:8010/admin > /tmp/admin-dashboard.html
          grep -q "TUD Admin Overview" /tmp/admin-dashboard.html

          curl -fsS -u "$TUD_API_ADMIN_USERNAME:$TUD_API_ADMIN_PASSWORD" \
            http://127.0.0.1:8010/admin/participant-management > /tmp/admin-participants.html
          grep -q "Participant Management" /tmp/admin-participants.html

          curl -fsS -u "$TUD_API_ADMIN_USERNAME:$TUD_API_ADMIN_PASSWORD" \
            http://127.0.0.1:8010/admin/tools > /tmp/admin-tools.html
          grep -q "Admin Tools" /tmp/admin-tools.html

      - name: Print backend log on failure
        if: failure()
        run: |
          echo "==== /tmp/tud-wheel-backend.log ===="
          cat /tmp/tud-wheel-backend.log || true
