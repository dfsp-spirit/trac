name: Release API Docs

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-attach-api-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install backend dependencies
        run: |
          cd backend
          uv sync --dev

      - name: Generate static API docs
        run: |
          cd backend
          uv run python scripts/generate_release_api_docs.py --output-dir /tmp/release-api-docs
          tar -czf /tmp/release-api-docs-${{ github.event.release.tag_name }}.tar.gz -C /tmp release-api-docs

      - name: Upload docs as release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            /tmp/release-api-docs/openapi.json
            /tmp/release-api-docs/index.html
            /tmp/release-api-docs-${{ github.event.release.tag_name }}.tar.gz
          overwrite_files: true
