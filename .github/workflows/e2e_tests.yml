name: Frontend E2E Tests

on:
  push:
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: timeusediary_db
          POSTGRES_USER: timeusediary_user
          POSTGRES_PASSWORD: timeusediary_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U timeusediary_user -d timeusediary_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python and uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nginx gettext-base curl

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --frozen

      - name: Install frontend Playwright dependencies
        working-directory: frontend
        run: |
          npm install
          npx playwright install --with-deps ${{ matrix.browser }}

      - name: Configure nginx and frontend settings
        run: |
          sudo systemctl stop nginx || true
          export FRONTEND_PATH="$GITHUB_WORKSPACE/frontend/src/"
          envsubst '$FRONTEND_PATH' < dev_tools/ci/webserver_config/ci.nginx.conf > /tmp/nginx.conf
          cp dev_tools/ci/frontend_settings/tud_settings.ci.js frontend/src/settings/tud_settings.js
          # nginx config now specifies 'user runner' to run as the user that owns the files
          sudo nginx -c /tmp/nginx.conf -p /tmp/

      - name: Run backend and Playwright tests
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000/report/
        run: |
          set -euxo pipefail

          cp dev_tools/ci/backend_settings/.env.ci backend/.env
          cd backend
          uv run uvicorn o_timeusediary_backend.api:app --host 127.0.0.1 --port 8000 > /tmp/backend.log 2>&1 &
          backend_pid=$!

          sleep 5
          cat /tmp/backend.log

          cd ..

          trap 'kill "$backend_pid" || true' EXIT

          timeout 60s bash -c 'until curl -fsS http://127.0.0.1:8000/api/health > /dev/null; do sleep 2; done'
          timeout 60s bash -c 'until curl -fsS http://127.0.0.1:3000/tud_backend/api/health > /dev/null; do sleep 2; done'
          timeout 60s bash -c 'until curl -fsS http://127.0.0.1:3000/report/index.html > /dev/null; do sleep 2; done'

          cd frontend
          npx playwright test --project=${{ matrix.browser }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report-${{ matrix.browser }}
          path: frontend/playwright-report/
          if-no-files-found: ignore

      - name: Upload backend log
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: backend-log-${{ matrix.browser }}
          path: /tmp/backend.log
          if-no-files-found: ignore

      - name: Upload nginx logs
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: nginx-logs-${{ matrix.browser }}
          path: /tmp/*.log
          if-no-files-found: ignore