services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: timeusediary_db
      POSTGRES_USER: timeusediary_user
      POSTGRES_PASSWORD: timeusediary_password
    volumes:
      - trac-dev-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timeusediary_user -d timeusediary_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: ../dev_tools/docker/backend.Dockerfile
    working_dir: /workspace/backend
    command: >-
      sh -lc "uv sync --dev &&
      uv run gunicorn --reload -c /workspace/dev_tools/docker/gunicorn_conf.docker.py
      o_timeusediary_backend.api:app"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/workspace/backend
      - ./dev_tools/docker:/workspace/dev_tools/docker:ro
      - trac-dev-backend-venv:/workspace/backend/.venv
      - trac-dev-uv-cache:/root/.cache/uv
      - ./dev_tools/docker/backend_settings/.env.dev-docker:/workspace/backend/.env:ro

  web:
    image: nginx:1.27-alpine
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/usr/share/nginx/html/report:ro
      - ./dev_tools/docker/frontend_settings/tud_settings.dev-docker.js:/usr/share/nginx/html/report/settings/tud_settings.js:ro
      - ./dev_tools/docker/webserver_config/dev.docker.nginx.conf:/etc/nginx/conf.d/default.conf:ro

  e2e:
    image: mcr.microsoft.com/playwright:v1.55.0-jammy
    profiles:
      - e2e
    working_dir: /workspace/frontend
    depends_on:
      - web
    environment:
      PLAYWRIGHT_BASE_URL: http://web:3000/report/
    volumes:
      - ./frontend:/workspace/frontend
      - trac-dev-e2e-node-modules:/workspace/frontend/node_modules
      - trac-dev-npm-cache:/root/.npm
    command: >-
      sh -lc "npm install && npx playwright test"

volumes:
  trac-dev-postgres-data:
  trac-dev-backend-venv:
  trac-dev-uv-cache:
  trac-dev-e2e-node-modules:
  trac-dev-npm-cache:
